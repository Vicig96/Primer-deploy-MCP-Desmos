<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Desmos Graph Widget</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        background: #ffffff;
        color: #111827;
      }

      #wrap {
        padding: 12px;
      }

      #layout {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 12px;
        align-items: start;
      }

      @media (max-width: 900px) {
        #layout {
          grid-template-columns: 1fr;
        }
      }

      .card {
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 12px;
        background: #fff;
      }

      #calculator {
        width: 100%;
        height: 520px;
        border-radius: 12px;
        overflow: hidden;
      }

      #title {
        margin: 0 0 8px 0;
        font-size: 18px;
      }

      #status {
        margin: 0 0 10px 0;
        font-size: 13px;
        color: #4b5563;
      }

      #summary {
        margin: 0 0 10px 0;
        line-height: 1.4;
        color: #111827;
      }

      #points {
        margin: 0;
        padding-left: 18px;
      }

      #points li {
        margin-bottom: 6px;
      }

      .muted {
        color: #6b7280;
      }
    </style>

    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=TU_API_KEY_DESMOS&lang=es"></script>
  </head>
  <body>
    <div id="wrap">
      <div id="layout">
        <div class="card">
          <h2 id="title">Gráfica</h2>
          <div id="status">Esperando datos…</div>
          <div id="calculator"></div>
        </div>

        <div class="card">
          <h3 style="margin-top: 0;">Resumen</h3>
          <p id="summary" class="muted">Aquí aparecerá una explicación breve.</p>

          <h3>Puntos clave</h3>
          <ul id="points">
            <li class="muted">Aquí aparecerán los puntos clave.</li>
          </ul>
        </div>
      </div>
    </div>

    <script type="module">
      const titleEl = document.getElementById("title");
      const statusEl = document.getElementById("status");
      const summaryEl = document.getElementById("summary");
      const pointsEl = document.getElementById("points");
      const calculatorEl = document.getElementById("calculator");

      let calculator = null;
      let currentData = {
        title: "Gráfica",
        latex: "y=x^2",
        summary: "",
        keyPoints: []
      };

      function ensureCalculator() {
        if (!calculator) {
          calculator = Desmos.GraphingCalculator(calculatorEl);
        }
        return calculator;
      }

      function renderGraph(latex) {
        const calc = ensureCalculator();
        calc.setExpression({ id: "main", latex });
      }

      function renderInfo(data) {
        titleEl.textContent = data.title || "Gráfica";
        statusEl.textContent = `Mostrando: ${data.latex || "y=x^2"}`;

        if (data.summary && data.summary.trim()) {
          summaryEl.textContent = data.summary;
          summaryEl.classList.remove("muted");
        } else {
          summaryEl.textContent = "Aquí aparecerá una explicación breve.";
          summaryEl.classList.add("muted");
        }

        pointsEl.innerHTML = "";
        if (Array.isArray(data.keyPoints) && data.keyPoints.length > 0) {
          data.keyPoints.forEach((point) => {
            const li = document.createElement("li");
            li.textContent = point;
            pointsEl.appendChild(li);
          });
        } else {
          const li = document.createElement("li");
          li.textContent = "Aquí aparecerán los puntos clave.";
          li.classList.add("muted");
          pointsEl.appendChild(li);
        }
      }

      function renderAll() {
        renderGraph(currentData.latex || "y=x^2");
        renderInfo(currentData);
      }

      function updateFromResponse(response) {
        const sc = response?.structuredContent || {};

        currentData = {
          title: sc.title || "Gráfica",
          latex: sc.latex || sc.expression || "y=x^2",
          summary: sc.summary || "",
          keyPoints: Array.isArray(sc.keyPoints) ? sc.keyPoints : []
        };

        renderAll();
      }

      let rpcId = 0;
      const pendingRequests = new Map();

      const rpcNotify = (method, params) => {
        window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
      };

      const rpcRequest = (method, params) =>
        new Promise((resolve, reject) => {
          const id = ++rpcId;
          pendingRequests.set(id, { resolve, reject });
          window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
        });

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) return;
          const message = event.data;
          if (!message || message.jsonrpc !== "2.0") return;

          if (typeof message.id === "number") {
            const pending = pendingRequests.get(message.id);
            if (!pending) return;
            pendingRequests.delete(message.id);

            if (message.error) {
              pending.reject(message.error);
              return;
            }

            pending.resolve(message.result);
            return;
          }

          if (message.method === "ui/notifications/tool-result") {
            updateFromResponse(message.params);
          }
        },
        { passive: true }
      );

      async function initializeBridge() {
        await rpcRequest("ui/initialize", {
          appInfo: { name: "desmos-widget", version: "0.2.0" },
          appCapabilities: {},
          protocolVersion: "2026-01-26"
        });

        rpcNotify("ui/notifications/initialized", {});
      }

      async function boot() {
        try {
          await initializeBridge();
          renderAll();
        } catch (err) {
          console.error(err);
          statusEl.textContent = "Error inicializando el widget.";
        }
      }

      boot();
    </script>
  </body>
</html>
